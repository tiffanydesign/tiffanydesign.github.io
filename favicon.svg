<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#c2c9b0"/>

  <!-- Left antenna -->
  <path d="M 49 47 Q 37 29 32 18"
        fill="none" stroke="#3d5c3a" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="32" cy="17" r="2.6" fill="#3d5c3a"/>

  <!-- Right antenna (slight asymmetry for hand-drawn feel) -->
  <path d="M 51 47 Q 63 28 68 18"
        fill="none" stroke="#3d5c3a" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="68" cy="17" r="2.6" fill="#3d5c3a"/>

  <!-- Upper left wing -->
  <path d="M 50 50 C 44 33 18 22 13 40 C 9 55 32 63 50 56"
        fill="none" stroke="#3d5c3a" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper right wing (slightly different control pts → hand-drawn feel) -->
  <path d="M 50 50 C 56 32 82 23 87 40 C 91 54 68 63 50 56"
        fill="none" stroke="#3d5c3a" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lower left wing -->
  <path d="M 50 58 C 41 64 24 69 22 80 C 20 88 38 89 50 76"
        fill="none" stroke="#3d5c3a" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lower right wing -->
  <path d="M 50 58 C 59 63 76 69 78 79 C 80 88 62 90 50 76"
        fill="none" stroke="#3d5c3a" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Body (slim vertical oval) -->
  <ellipse cx="50" cy="62" rx="3" ry="14"
           fill="none" stroke="#3d5c3a" stroke-width="3"/>
</svg>
